# .github/workflows/auto-post.yml
# 매일 오전 9시 자동으로 AI 트렌드 글 작성 후 발행

name: 자동 글 발행

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 0시 = 한국시간 오전 9시
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  auto-post:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 자동 글 생성 스크립트 실행
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/auto-post.js

      - name: 새 글 커밋 & 푸시
        run: |
          git config user.name "AI Auto Bot"
          git config user.email "bot@ai-blog.com"
          git add posts/
          git diff --staged --quiet || git commit -m "자동 글 발행: $(date '+%Y-%m-%d')"
          git push
